<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Rw9 SYSTEM DEPLOYMENT | IN PROGRESS</title>
    <style>
        :root {
            --neon-purple: #bf00ff;
            --bg-deep: #05000a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; cursor: none; }

        body {
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
        }

        /* Hintergrund-Animation (Sterne/Rauschen) */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.3;
        }

        #main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 80%;
            max-width: 800px;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 15px;
            color: var(--neon-purple);
            text-shadow: 0 0 30px var(--neon-purple);
            margin-bottom: 10px;
            animation: pulse 3s infinite ease-in-out;
        }

        .status-text {
            font-size: 14px;
            color: #444;
            letter-spacing: 4px;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        /* Der 2-Stunden Ladebalken */
        .progress-box {
            width: 100%;
            height: 4px;
            background: #111;
            border-radius: 2px;
            position: relative;
            box-shadow: 0 0 10px rgba(0,0,0,1);
        }

        #bar-fill {
            width: 0%;
            height: 100%;
            background: var(--neon-purple);
            box-shadow: 0 0 20px var(--neon-purple);
            transition: width 1s linear;
        }

        .info-grid {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 12px;
            color: #222;
            font-weight: bold;
        }

        #alarm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 0, 0, 0.2);
            z-index: 100;
            display: none;
            animation: flash 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        @keyframes flash {
            0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; }
        }

        /* Versteckter Cheat-Button für dein Video (unten rechts) */
        #secret-trigger {
            position: fixed;
            bottom: 5px; right: 5px;
            width: 10px; height: 10px;
            background: transparent;
            z-index: 1000;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="alarm-overlay"></div>
    
    <audio id="ambient" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3"></audio>
    <audio id="alarm-sfx"><source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

    <div id="main-container">
        <p style="color: #222; margin-bottom: 5px;">PROTOCOL v12.9.8_UPGRADE</p>
        <h1>SYSTEM UPDATE</h1>
        <p class="status-text">Owner <b>Rw9</b> is rewriting core modules...</p>

        <div class="progress-box">
            <div id="bar-fill"></div>
        </div>

        <div class="info-grid">
            <div id="percent">0.00%</div>
            <div id="eta">ETA: 02:00:00</div>
        </div>
    </div>

    <div id="secret-trigger" onclick="skipWait()"></div>

    <script>
        const TOTAL_TIME = 7200; // 2 Stunden in Sekunden
        let secondsPassed = 0;
        let isComplete = false;

        function update() {
            if(isComplete) return;

            secondsPassed++;
            let progress = (secondsPassed / TOTAL_TIME) * 100;
            
            // UI Update
            document.getElementById('bar-fill').style.width = progress + "%";
            document.getElementById('percent').innerText = progress.toFixed(2) + "%";

            // Zeitberechnung
            let remaining = TOTAL_TIME - secondsPassed;
            let h = Math.floor(remaining / 3600).toString().padStart(2, '0');
            let m = Math.floor((remaining % 3600) / 60).toString().padStart(2, '0');
            let s = (remaining % 60).toString().padStart(2, '0');
            document.getElementById('eta').innerText = `ETA: ${h}:${m}:${s}`;

            if(secondsPassed >= TOTAL_TIME) {
                finishUpdate();
            }
        }

        function finishUpdate() {
            isComplete = true;
            document.getElementById('alarm-overlay').style.display = 'block';
            document.getElementById('alarm-sfx').play();
            
            setTimeout(() => {
                // Hier wird nach dem Alarm auf die eigentliche Engine v12.9.7 Beta weitergeleitet
                // Du kannst hier auch einfach ein Alert machen oder den Inhalt austauschen
                alert("UPDATE COMPLETE. DEPLOYING v12.9.7 BETA...");
                location.href = "v1297_engine.html"; // Oder wie deine Hauptdatei heißt
            }, 5000);
        }

        // CHEAT FÜR DICH: Wenn du im Video nicht warten willst, klick unten rechts in die Ecke!
        function skipWait() {
            secondsPassed = 7195; 
            document.getElementById('ambient').play(); // Musik startet beim ersten Klick
        }

        // Hintergrund Animation
        const c = document.getElementById('bg-canvas');
        const ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let dots = [];
        for(let i=0; i<200; i++) dots.push({x: Math.random()*c.width, y: Math.random()*c.height, s: Math.random()*2});
        
        function draw() {
            ctx.clearRect(0,0,c.width,c.height);
            ctx.fillStyle = "#bf00ff";
            dots.forEach(d => {
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.s, 0, 7);
                ctx.fill();
                d.y -= 0.2; if(d.y < 0) d.y = c.height;
            });
            requestAnimationFrame(draw);
        }
        draw();

        // Start
        setInterval(update, 1000);
        window.onclick = () => { document.getElementById('ambient').play(); }; // Musik-Aktivierung
    </script>
</body>
</html>
