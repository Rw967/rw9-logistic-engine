<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rw9 ENGINE | SYSTEM LOCKDOWN</title>
    <style>
        :root {
            --neon-purple: #bf00ff;
            --neon-cyan: #00ffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Consolas', monospace; }

        body {
            background-color: #000;
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Hintergrund-Partikel */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
            opacity: 0.2;
        }

        /* UPDATE SCREEN CONTAINER */
        #update-screen {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 45px;
            letter-spacing: 12px;
            color: var(--neon-purple);
            text-shadow: 0 0 20px var(--neon-purple);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .sub-text {
            color: #444;
            font-size: 12px;
            letter-spacing: 3px;
            margin-bottom: 60px;
        }

        /* LADEBALKEN */
        .progress-container {
            width: 100%;
            height: 4px;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--neon-purple);
            box-shadow: 0 0 20px var(--neon-purple);
            transition: width 1s linear;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 11px;
            color: #222;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* ALARM OVERLAY */
        #alarm {
            position: fixed;
            inset: 0;
            background: rgba(255, 0, 0, 0.3);
            display: none;
            z-index: 100;
            animation: flash 0.6s infinite;
        }

        @keyframes flash {
            0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; }
        }

        #secret-btn {
            position: fixed;
            bottom: 0; right: 0;
            width: 20px; height: 20px;
            background: transparent;
            z-index: 1000;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="alarm"></div>

    <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3"></audio>

    <div id="update-screen">
        <p style="color: #111; font-size: 10px; margin-bottom: 5px;">SECURITY PROTOCOL v12.9.9</p>
        <h1>System Update</h1>
        <p class="sub-text">Owner <b>Rw9</b> is deploying new core logic...</p>

        <div class="progress-container">
            <div id="progress-fill"></div>
        </div>

        <div class="stats">
            <div id="perc-display">0.00%</div>
            <div id="eta-display">ETA: 02:00:00</div>
        </div>
    </div>

    <div id="secret-btn" onclick="cheat()"></div>

    <script>
        const DURATION = 7200; // 2 Stunden
        const KEY = "rw9_start_time";
        let startTime;
        let finished = false;

        function init() {
            // Check Speicher
            const saved = localStorage.getItem(KEY);
            if (saved) {
                startTime = parseInt(saved);
            } else {
                startTime = Date.now();
                localStorage.setItem(KEY, startTime);
            }
            
            // Loop starten
            setInterval(tick, 1000);
            animate();
        }

        function tick() {
            if (finished) return;

            const now = Date.now();
            const elapsed = Math.floor((now - startTime) / 1000);
            let percent = (elapsed / DURATION) * 100;

            if (percent >= 100) {
                percent = 100;
                complete();
            }

            // UI Update
            document.getElementById('progress-fill').style.width = percent + "%";
            document.getElementById('perc-display').innerText = percent.toFixed(2) + "%";

            // Zeitrechnung
            let rem = DURATION - elapsed;
            if (rem < 0) rem = 0;
            let h = Math.floor(rem / 3600).toString().padStart(2, '0');
            let m = Math.floor((rem % 3600) / 60).toString().padStart(2, '0');
            let s = (rem % 60).toString().padStart(2, '0');
            document.getElementById('eta-display').innerText = `ETA: ${h}:${m}:${s}`;
        }

        function complete() {
            if (finished) return;
            finished = true;
            document.getElementById('alarm').style.display = 'block';
            console.log("UPDATE FINISHED");
            
            setTimeout(() => {
                // Hier den Link zu deiner Engine v12.9.7 einfügen!
                alert("DEPLOYING v12.9.7 BETA...");
                // location.href = "deine_engine.html";
            }, 5000);
        }

        function cheat() {
            // Setzt die Zeit auf 1h 59m 50s
            startTime = Date.now() - ((DURATION - 10) * 1000);
            localStorage.setItem(KEY, startTime);
        }

        // Hintergrund Effekt
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let p = [];
        for(let i=0; i<100; i++) p.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2});

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#bf00ff";
            p.forEach(dot => {
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, dot.r, 0, Math.PI*2);
                ctx.fill();
                dot.y -= 0.5;
                if(dot.y < 0) dot.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }

        window.onload = init;
        window.onclick = () => { document.getElementById('bg-music').play(); };
    </script>
</body>
</html>
